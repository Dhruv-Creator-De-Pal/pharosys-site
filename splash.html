<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boot Splash</title>
  <style>
    :root {
      --bg: #000000;
      --navy: #0b1c3d;
      --orange: #ff6b1a;
      --dot: #a5a5a5;
      --text: #d7d7d7;
      --mono: 'SFMono-Regular', 'JetBrains Mono', 'Fira Code', 'Roboto Mono', monospace;
      --sans: 'Poppins', 'Montserrat', 'Avenir Next', 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
      padding: 32px;
    }

    .logo {
      font-size: clamp(32px, 6vw, 64px);
      letter-spacing: 0.12em;
      font-weight: 800;
      color: var(--navy);
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(11, 28, 61, 0.4), 0 0 12px rgba(255, 107, 26, 0.25);
      position: relative;
      animation: fadeIn 1.2s ease forwards;
      opacity: 0;
    }

    .logo::after {
      content: '';
      position: absolute;
      inset: -18% -12%;
      border: 2px solid rgba(255, 107, 26, 0.22);
      border-radius: 18px;
      filter: blur(12px);
      opacity: 0.5;
      pointer-events: none;
    }

    .accent {
      color: var(--orange);
    }

    .tagline {
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 1s ease 0.6s forwards;
    }

    .dots {
      display: inline-flex;
      gap: 10px;
      height: 12px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--dot);
      opacity: 0.35;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    .status {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      color: #c7c7c7;
      opacity: 0.7;
      white-space: nowrap;
      animation: fadeIn 0.9s ease 0.8s forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.25; transform: translateY(0); }
      50% { opacity: 0.8; transform: translateY(-2px); }
    }

    @media (max-width: 480px) {
      .status { bottom: 32px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="stack">
    <div class="logo">PHARO<span class="accent">SYS</span></div>
    <div class="tagline">PRECISION COMPUTE OS</div>
    <div class="dots" aria-label="loading">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <div class="status" id="status">[OK] MEMORY MAP VERIFIED.</div>

  <script>
    const lines = [
      '[OK] MEMORY MAP VERIFIED.',
      '[LOAD] MOUNTING VIRTUAL FILESYSTEM...',
      '[INIT] SERVICES HANDOFF COMPLETE.',
      '[OK] SECURE CHANNEL ESTABLISHED.',
    ];

    const statusEl = document.getElementById('status');
    let idx = 0;

    function rotateLine() {
      idx = (idx + 1) % lines.length;
      statusEl.style.opacity = 0;
      setTimeout(() => {
        statusEl.textContent = lines[idx];
        statusEl.style.opacity = 0.75;
      }, 200);
    }

    setInterval(rotateLine, 1700);
  </script>
</body>
</html>
