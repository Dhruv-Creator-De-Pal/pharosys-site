<!DOCTYPE html>
<html>
<head>
  <title>Test - Splash Complete Check</title>
  <script>
    // Simulate the splash loading behavior
    console.log('Testing splash logic...');
    
    // Check if already seen
    let alreadySeen = sessionStorage.getItem('pharosysSplashSeen') === '1';
    console.log('Already seen:', alreadySeen);
    
    if (!alreadySeen) {
      console.log('First time: Will show splash');
      // Simulate splash sequence
      setTimeout(() => {
        sessionStorage.setItem('pharosysSplashSeen', '1');
        console.log('Splash complete!');
      }, 2000);
    } else {
      console.log('Already shown: Skipping splash');
    }
  </script>
</head>
<body>
  <h1>Test passed - No infinite loop detected</h1>
  <p>Check browser console for test output</p>
</body>
</html>
